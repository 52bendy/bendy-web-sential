apiVersion: v1
kind: Secret
metadata:
  name: bendy-web-sential-secrets
  labels:
    app: bendy-web-sential
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_USE_OPENSSL_RAND_BASE64_32"
  totp-aes-key: "CHANGE_ME_USE_OPENSSL_RAND_BASE64_32"
---
# 注释: 使用以下命令创建 Secret:
# kubectl create secret generic bendy-web-sential-secrets \
#   --from-literal=jwt-secret=$(openssl rand -base64 32) \
#   --from-literal=totp-aes-key=$(openssl rand -base64 32)
