apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bendy-web-sential
  labels:
    app: bendy-web-sential
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: bendy-web-sential.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: bendy-web-sential
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bendy-web-sential
            port:
              number: 80
---
# 注释: 如果需要 TLS，使用以下配置:
# spec:
#   tls:
#   - hosts:
#     - bendy-web-sential.local
#     secretName: bendy-web-sential-tls
