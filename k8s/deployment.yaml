apiVersion: apps/v1
kind: Deployment
metadata:
  name: bendy-web-sential
  namespace: default
  labels:
    app: bendy-web-sential
    version: v0.7.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bendy-web-sential
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bendy-web-sential
        version: v0.7.0
    spec:
      containers:
      - name: backend
        image: bendy-web-sential:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: gateway
          containerPort: 8080
          protocol: TCP
        - name: admin
          containerPort: 3000
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: BWS_DATABASE_URL
          value: "sqlite:///data/bws.db"
        - name: BWS_GATEWAY_PORT
          value: "8080"
        - name: BWS_ADMIN_PORT
          value: "3000"
        - name: BWS_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bendy-web-sential-secrets
              key: jwt-secret
              optional: true
        volumeMounts:
        - name: bws-data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /api/v1/k8s/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          failureThreshold: 30
          periodSeconds: 10
      - name: frontend
        image: bendy-web-sential-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5173
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 5173
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 5173
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: bws-data
        persistentVolumeClaim:
          claimName: bendy-web-sential-data
